<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access4 Login</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
          "imports": {
            "@/": "./js/",
            "@/core/": "./js/core/",
            "@/shared/": "./js/shared/",
            "@/ui/": "./js/ui/"
          }
        }
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js/dist/zip.min.js"></script>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="loginView">
    <header>
        <h1 id="login_title">Login</h1>
    </header>

    <main id="loginBody">
        <!-- Sign-in button -->
        <button id="login_signinBtn">Sign in with Google</button>

        <div id="login_signinStatus" class="login-user-line">
            <div class="user-info-left">
                <span id="login_welcomeSpan" class="not-signed-in">Not signed in</span>
                <b><span id="login_authorizedNameSpan"></span></b>
            </div>
            <button id="login_signoutLnk" class="link-button" style="display: none;">Sign out</button>
        </div>
        <div id="login_authMsg"></div>

        <!-- Password input appears after sign-in -->
        <div id="login_pwdSection">
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login_pwdInput">
            </div>
            <div id="login_confirmPwdSection" class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="login_confirmPwdInput">
            </div>
            <button id="login_unlockBtn">Unlock</button>
            <div id="login_recoverySection">
                <button id="login_recoverBtn" style="display: none;">Recover</button>
                <button  id="login_recoveryLnk" style="display: none;" class="link-button">Need recovery?</button>
            </div>
            <div id="login_statusMsg" class="unlock-message"></div>
        </div>
    </main>
    <button  id="login_restoreBackupLnk" class="link-button">Restore backup</button>
</div>

<div id="restoreBackupView" class="modal-overlay" style="display: none;">
    <div id="restoreBackup_mainSection" class="modal-mini-card">

        <header class="modal-header">
            <span id="restoreBackup_title" style="font-weight:bold;">Restore Vault</span>
            <button id="restoreBackup_closeBtn" title="Close">✕</button>
        </header>

        <div id="restoreBackup_inputSection" class="modal-simple-body">
            <p class="input-label">Paste Backup Restore Text (from .txt)</p>
            <textarea id="restoreBackup_encInput"
                      class="restore-textarea"
                      placeholder="Paste recovery string..."
                      spellcheck="false"
                      autocorrect="off"
                      autocapitalize="none"></textarea>

            <p class="input-label">Password (access password for the backup)</p>
            <input type="password"
                   id="restoreBackup_pwdInput"
                   class="restore-password-input"
                   placeholder="Enter backup password"
                   autocorrect="off"
                   autocapitalize="none"
                   autocomplete="current-password">

            <button id="restoreBackup_decryptBtn" class="btn-primary" style="width: 100%;">Decrypt</button>
        </div>

        <div id="restoreBackup_outputSection" class="modal-simple-body" style="display: none;">
            <p class="status-success">✅ Decrypted Successfully</p>
            <textarea id="restoreBackup_outputTxa" class="restore-output-textarea" readonly></textarea>
            <button id="restoreBackup_copyBtn" class="btn-secondary" style="width: 100%;">Copy to Clipboard</button>
        </div>

    </div>
</div>

<div id="systemModal_mainSection" class="modal-overlay" style="display: none;">
    <div class="modal-mini-card">
        <header class="modal-header">
            <h2 id="systemModal_title"></h2>
            <!-- Optional: add a close button here if you want it to behave like Restore -->
        </header>
        <div class="modal-simple-body">
            <p id="systemModal_message"></p>
            <div class="button-group">
                <button id="systemModal_cancelBtn" class="secondary-btn"></button>
                <button id="systemModal_okBtn" class="btn-primary"></button>
            </div>
        </div>
    </div>
</div>

<!-- VAULT VIEW -->
<div id="vaultView" style="display: none;">
    <header>
        <div id="vault_headerLeftSide" class="header-side-left" style="display: flex; align-items: center; flex: 1;">
            <button id="vault_toggleSecureBtn" class="icon-button" style="margin-right: 10px;">🔒</button>
            <h1 id="vault_title" class="member-user" style="font-size: 1.1rem; margin: 0;">Vault</h1>
        </div>

        <div id="vault_headerRightSide" class="header-side-right">
            <button id="vaultMenuBar_addBtn" class="icon-button" title="Add">➕</button>
            <button id="vaultMenuBar_renameBtn" class="icon-button" title="Rename">✏️</button>
            <button id="vaultMenuBar_deleteBtn" class="icon-button danger-text" title="Delete">🗑️</button>

            <div class="menu-container">
                <button id="vaultMenu_menuBtn" class="icon-button" aria-label="Options">⋮</button>
                <div id="vaultMenu_menuDropdown" class="menuDropdown-content">
                    <button id="vaultMenu_saveMenu">Save</button>
                    <button id="vaultMenu_discardChangesMenu">Discard changes</button>
                    <button id="vaultMenu_toggleEditMenu">Toggle Edit</button>
                    <hr>
                    <button id="vaultMenu_rawDataMenu">Raw data</button>
                    <button id="vaultMenu_copyLogsMenu">Copy logs</button>
                    <button id="vaultMenu_toggleLogsMenu" style="display: none;">Toggle logs</button>
                    <hr>
                    <button id="vaultMenu_usersMenu">Users</button>
                    <button id="vaultMenu_syncAccessMenu">Sync Access</button>
                    <button id="vaultMenu_runBackupMenu">Run Backup</button>
                    <button id="vaultMenu_recoveryRotationMenu">Recovery Rotation</button>
                    <button id="vaultMenu_privateVaultMenu">Private vault</button>
                    <hr>
                    <button id="vaultMenu_selectMenu">Select</button>
                    <button id="vaultMenu_cutMenu" style="display:none;">Cut</button>
                    <button id="vaultMenu_pasteMenu" style="display:none;">Paste</button>
                    <hr>
                    <button id="vaultMenu_logoutMenu" class="danger-text">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div id="vaultRawData_mainSection" style="display:none;">
        <textarea id="vaultRawData_textContent" spellcheck="false" readonly></textarea>

        <div id="vaultRawData_treeContent" class="json-tree" style="display:none;"></div>

        <div class="button-group">
            <button id="vaultRawData_toggleViewBtn">Tree View</button>
            <button id="vaultRawData_closeBtn">Close</button>
        </div>
    </div>

    <main id="vaultBody">

        <!-- Vault Main Section -->
        <div id="vault_mainSection">

            <div id="vaultNavBar_mainSection">
                <div id="vaultNavBar_content" style="flex: 1; position: relative;">
                    <nav id="vaultNavBar_breadcrumbs"></nav>

                    <div id="vaultNavBar_filterSection" class="hidden">
                        <input type="text" id="vaultNavBar_filterInput" placeholder="Filter vault..." autocomplete="off">
                    </div>
                </div>

                <span id="vaultNavBar_filterToggle" title="Search/Filter">🔍</span>
            </div>

            <div id="vault_explorer"></div>
            <div id="vault_statusMsg" class="unlock-message"></div>
        </div>

        <div id="advSearch_mainSection" class="modal-overlay hidden">
            <div class="modal-mini-card adv-search-container">

                <header class="adv-header">
                    <h2 id="advSearch_title">Advanced Search</h2>
                    <button id="advSearch_close" class="close-x-btn">&times;</button>
                </header>

                <div class="modal-simple-body modal-body">
                    <div class="search-field">
                        <label class="input-label">Search In</label>
                        <select id="advSearch_scope">
                            <option value="">All (Default)</option>
                            <optgroup label="System">
                                <option value="groups">Groups Only</option>
                                <option value="items">Items Only</option>
                                <option value="details">Item Details Only</option>
                                <option value="attachments">Attachments Only</option>
                            </optgroup>
                            <optgroup id="advSearch_dynamicLabels" label="Field Labels"></optgroup>
                        </select>
                    </div>

                    <div class="search-field">
                        <label class="input-label">Attachments</label>
                        <select id="advSearch_attach">
                            <option value="" selected>Any (Don't care)</option>
                            <option value="only">Items With Attachments</option>
                            <option value="none">Items Without Attachments</option>
                        </select>
                    </div>

                    <div class="search-field">
                        <label class="input-label">Logic</label>
                        <select id="advSearch_logic">
                            <option value="contains" selected>Contains</option>
                            <option value="exact">Exact Match</option>
                            <option value="or">OR (Spaces)</option>
                            <option value="and">AND (Spaces)</option>
                        </select>
                    </div>

                    <div class="search-field checkbox-row">
                        <label class="check-label">
                            <input type="checkbox" id="advSearch_case">
                            <span>Case Sensitive</span>
                        </label>
                    </div>
                </div>

                <hr class="modal-sep">

                <div class="modal-footer">
                    <div class="button-group">
                        <button id="advSearch_reset" class="secondary-btn">Reset All</button>
                        <button id="advSearch_run" class="btn-primary">Apply</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="vaultConfirm_mainSection" class="inline-ui-view" style="display:none;">
            <div>
                <h2 id="vaultConfirm_title" class="data-title">Confirm</h2>
                <p id="vaultConfirm_message" style="margin-bottom: 20px;">Are you sure?</p>

                <div class="button-group">
                    <button id="vaultConfirm_cancelBtn" class="secondary-btn">Cancel</button>
                    <button id="vaultConfirm_okBtn" class="danger-btn">Confirm</button>
                </div>
            </div>
        </div>

        <!-- Vault Add new section (group, item etc.)-->
        <div id="vaultAddNew_mainSection" style="display:none;">
            <div>
                <h3 id="vaultAddNew_title">Add New</h3>
                <div class="input-group">
                    <label id="vaultAddNew_label">Name</label>
                    <input type="text" id="vaultAddNew_input" placeholder="Enter name...">
                </div>
                <div class="button-group">
                    <button id="vaultAddNew_cancelBtn" class="secondary-btn">Cancel</button>
                    <button id="vaultAddNew_addBtn">Add</button>
                </div>
            </div>
            <div id="vaultAddNew_statusMsg" class="unlock-message"></div>
        </div>

        <!-- Vault Rotate Recovery Key Section -->
        <div id="vaultRecoveryKey_mainSection" style="display: none;">
            <div id="vaultRecoveryKey_currentPwdSection" class="input-group" style="display: none;">
                <label>Current Password</label>
                <input type="password" id="vaultRecoveryKey_currentPwdInput">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="vaultRecoveryKey_pwdInput">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="vaultRecoveryKey_confirmPwdInput">
            </div>
            <div class="button-group">
                <button id="vaultRecoveryKey_cancelBtn">Cancel</button>
                <button id="vaultRecoveryKey_rotateBtn">Rotate Key</button>
            </div>
            <div id="vaultRecoveryKey_statusMsg" class="unlock-message"></div>
        </div>

        <!-- Private Vault Creation Section -->
        <div id="vaultCreatePrivate_mainSection" style="display: none;">
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="vaultCreatePrivate_pwdInput">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="vaultCreatePrivate_confirmPwdInput">
            </div>
            <div class="button-group">
                <button id="vaultCreatePrivate_cancelBtn">Cancel</button>
                <button id="vaultCreatePrivate_createBtn">Create</button>
            </div>
            <div id="vaultCreatePrivate_statusMsg" class="unlock-message"></div>
        </div>

        <div id="vaultUsers_mainSection" class="inline-ui-view" style="display: none;">
            <div class="inline-view-header">
                <h3 id="vaultUsers_title">Member Administration</h3>
                <button id="vaultUsers_closeBtn" class="close-x-btn" title="Close">✕</button>
            </div>

            <div class="input-group">
                <label>Select Member</label>
                <select id="vaultUsers_userSelect">
                    <option value="">-- Choose a member --</option>
                </select>
            </div>

            <div id="vaultUsers_formFields" style="display: none; margin-top: 20px;">
                <div class="input-group">
                    <label>Role</label>
                    <select id="vaultUsers_roleSelect">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-container">
                        Read Only Access
                        <input type="checkbox" id="vaultUsers_readonlyCheck">
                    </label>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-container">
                        Allow Attachments
                        <input type="checkbox" id="vaultUsers_attachmentsCheck">
                    </label>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-container">
                        Force Password Change
                        <input type="checkbox" id="vaultUsers_forcePwdCheck">
                    </label>
                </div>
                <div class="button-group-admin" style="margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee;">

                    <button id="vaultUsers_removeBtn" class="danger-btn">Revoke Access</button>

                    <div class="action-group-right">
                        <button id="vaultUsers_cancelBtn" class="secondary-btn">Cancel</button>
                        <button id="vaultUsers_saveBtn">Save</button>
                    </div>
                </div>
            </div>
            <div id="vaultUsers_statusMsg" class="unlock-message"></div>
        </div>

    </main>
</div>
<pre id="log" style="display: none;"></pre>
<script src="js/app.js" type="module" defer></script>
</body>
</html>
