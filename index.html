<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access4 Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="loginView">
    <header>
        <h1 id="login_title">Login</h1>
    </header>

    <main id="loginBody">
        <!-- Sign-in button -->
        <button id="login_signinBtn">Sign in with Google</button>

        <div id="login_signinStatus" class="login-user-line">
            <div class="user-info-left">
                <span id="login_welcomeSpan" class="not-signed-in">Not signed in</span>
                <b><span id="login_authorizedNameSpan"></span></b>
            </div>
            <button id="login_signoutLnk" class="link-button" style="display: none;">Sign out</button>
        </div>
        <div id="login_authMsg"></div>

        <!-- Password input appears after sign-in -->
        <div id="login_pwdSection">
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login_pwdInput">
            </div>
            <div id="login_confirmPwdSection" class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="login_confirmPwdInput">
            </div>
            <button id="login_unlockBtn">Unlock</button>
            <div id="login_recoverySection">
                <button id="login_recoverBtn" style="display: none;">Recover</button>
                <button  id="login_recoveryLnk" style="display: none;" class="link-button">Need recovery?</button>
            </div>
            <div id="login_statusMsg" class="unlock-message"></div>
        </div>
    </main>
</div>

<!-- VAULT VIEW -->
<div id="vaultView" style="display: none;">
    <header>
        <div class="header-side-left" style="display: flex; align-items: center; flex: 1;">
            <button id="vault_toggleSecureBtn" class="icon-button" style="margin-right: 10px;">🔒</button>
            <h1 id="vault_title" style="font-size: 1.1rem; margin: 0;">Vault</h1>
        </div>

        <div class="header-side-right">
            <button id="vault_addBtn" class="icon-button" title="Add">➕</button>
            <button id="vault_deleteBtn" class="icon-button danger-text" title="Delete">🗑️</button>

            <div class="menu-container">
                <button id="vault_menuBtn" class="icon-button" aria-label="Options">⋮</button>
                <div id="vault_menuDropdown" class="menuDropdown-content">
                    <button id="vault_saveMenu">Save</button>
                    <button id="vault_toggleEditMenu">Toggle Edit</button>
                    <button id="vault_rawDataMenu">Raw data</button>
                    <button id="vault_copyLogsMenu">Copy logs</button>
                    <button id="vault_toggleLogsMenu" style="display: none;">Toggle logs</button>
                    <button id="vault_recoveryRotationMenu">Recovery Rotation</button>
                    <hr>
                    <button id="vault_logoutMenu" class="danger-text">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div id="vaultRawData_mainSection" style="display:none;">
        <div id="vaultRawData_content" class="code-block"></div>
        <button id="vaultRawData_closeBtn">Close</button>
    </div>

    <main id="vaultBody">

        <!-- Vault Main Section -->
        <div id="vault_mainSection">

            <div id="vault_navBar">
                <nav id="vault_breadcrumbs"></nav>
            </div>

            <div id="vault_explorer"></div>
            <div id="vault_statusMsg" class="unlock-message"></div>
        </div>

        <!-- Vault Add new section (group, item etc.)-->
        <div id="vaultAddNew_mainSection" style="display:none;">
            <div>
                <h3 id="vaultAddNew_title">Add New</h3>
                <div class="input-group">
                        <label id="vaultAddNew_label">Name</label>
                        <input type="text" id="vaultAddNew_input" placeholder="Enter name...">
                    </div>
                    <div class="button-group">
                        <button id="vaultAddNew_cancelBtn" class="secondary-btn">Cancel</button>
                        <button id="vaultAddNew_addBtn">Add</button>
                    </div>
                </div>
                <div id="vaultAddNew_statusMsg" class="unlock-message"></div>
            </div>

            <!-- Vault Delete section (group, item etc.)-->
            <div id="vaultDelete_mainSection" style="display:none;">
                <div>
                    <h3 id="vaultDelete_title" class="data-title">Confirm Deletion</h3>
                    <p id="vaultDelete_message" style="margin-bottom: 20px;">Are you sure you want to delete this?</p>

                    <div class="button-group">
                        <button id="vaultDelete_cancelBtn" class="secondary-btn">No, Keep it</button>
                        <button id="vaultDelete_confirmBtn" class="danger-text">Yes, Delete</button>
                    </div>
                </div>
            </div>

            <!-- Vault Rotate Recovery Key Section -->
            <div id="vaultRecoveryKey_mainSection" style="display: none;">
                <div id="vaultRecoveryKey_currentPwdSection" class="input-group" style="display: none;">
                    <label>Current Password</label>
                    <input type="password" id="vaultRecoveryKey_currentPwdInput">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="vaultRecoveryKey_pwdInput">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="vaultRecoveryKey_confirmPwdInput">
                </div>
                <div class="button-group">
                    <button id="vaultRecoveryKey_cancelBtn">Cancel</button>
                    <button id="vaultRecoveryKey_rotateBtn">Rotate Key</button>
                </div>
                <div id="vaultRecoveryKey_statusMsg" class="unlock-message"></div>
            </div>
        </main>
    </div>
    <pre id="log" style="display: none;"></pre>
    <script src="app.js" type="module" defer></script>
</body>
</html>
